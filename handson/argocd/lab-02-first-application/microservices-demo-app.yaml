apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/GoogleCloudPlatform/microservices-demo.git
    targetRevision: HEAD
    path: helm-chart
    helm:
      values: |
        serviceAccounts:
          create: true
        networkPolicies:
          create: false
        sidecars:
          create: false
        frontend:
          externalService: true

  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-demo

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
