apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-a
  namespace: argocd
spec:
  description: Project for Team A with restrictions
  
  # Allowed source repositories
  sourceRepos:
  - https://github.com/argoproj/argocd-example-apps.git
  - https://github.com/your-org/team-a-*
  
  # Allowed destination clusters and namespaces
  destinations:
  - namespace: team-a
    server: https://kubernetes.default.svc
  - namespace: team-a-dev
    server: https://kubernetes.default.svc
  - namespace: shared
    server: https://kubernetes.default.svc
  
  # Cluster-scoped resources that can be created
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  
  # Namespace-scoped resources that can be created
  namespaceResourceWhitelist:
  - group: 'apps'
    kind: Deployment
  - group: 'apps'
    kind: StatefulSet
  - group: 'apps'
    kind: DaemonSet
  - group: ''
    kind: Service
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: 'networking.k8s.io'
    kind: Ingress
  
  # Resources that are explicitly denied
  namespaceResourceBlacklist:
  - group: ''
    kind: ResourceQuota
  - group: ''
    kind: LimitRange
  
  # Project roles
  roles:
  - name: developer
    description: Developer role for Team A
    policies:
    - p, proj:team-a:developer, applications, get, team-a/*, allow
    - p, proj:team-a:developer, applications, sync, team-a/*, allow
    - p, proj:team-a:developer, applications, create, team-a/*, allow
    - p, proj:team-a:developer, applications, delete, team-a/*, deny
    groups:
    - team-a-developers
  
  - name: admin
    description: Admin role for Team A
    policies:
    - p, proj:team-a:admin, applications, *, team-a/*, allow
    groups:
    - team-a-admins
