name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate Argo CD Presentation PDF
        run: |
          # Create a simple script to generate PDF
          cat > generate-pdf.js << 'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            const htmlPath = 'file://' + path.resolve('presentation/argocd/index.html');
            console.log('Loading presentation from:', htmlPath);
            
            await page.goto(htmlPath, { 
              waitUntil: 'networkidle0',
              timeout: 30000
            });
            
            // Wait for impress.js to initialize
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            // Get total number of slides
            const slideCount = await page.evaluate(() => {
              return document.querySelectorAll('.step').length;
            });
            
            console.log(`Found ${slideCount} slides. Capturing each slide...`);
            
            const images = [];
            
            // Navigate through each slide and capture
            for (let i = 0; i < slideCount; i++) {
              console.log(`Capturing slide ${i + 1}/${slideCount}`);
              
              // Navigate to next slide (except first)
              if (i > 0) {
                await page.keyboard.press('ArrowRight');
                await new Promise(resolve => setTimeout(resolve, 1500));
              } else {
                // Wait a bit for first slide
                await new Promise(resolve => setTimeout(resolve, 500));
              }
              
              // Take screenshot of the slide
              const screenshot = await page.screenshot({
                type: 'png',
                fullPage: false
              });
              
              images.push(screenshot);
            }
            
            await browser.close();
            
            console.log('Generating PDF from slides...');
            
            // Create a new browser instance to generate PDF from images
            const pdfBrowser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const pdfPage = await pdfBrowser.newPage();
            
            // Create HTML with all images
            const htmlContent = `
              <!DOCTYPE html>
              <html>
              <head>
                <style>
                  body { margin: 0; padding: 0; }
                  .slide { 
                    width: 100vw; 
                    height: 100vh; 
                    page-break-after: always;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    background: white;
                  }
                  .slide img {
                    max-width: 100%;
                    max-height: 100%;
                    object-fit: contain;
                  }
                  .slide:last-child { page-break-after: auto; }
                </style>
              </head>
              <body>
                ${images.map((_, idx) => `<div class="slide"><img src="data:image/png;base64,PLACEHOLDER_${idx}" /></div>`).join('')}
              </body>
              </html>
            `;
            
            // Replace placeholders with actual base64 images
            let finalHtml = htmlContent;
            for (let i = 0; i < images.length; i++) {
              const base64 = images[i].toString('base64');
              finalHtml = finalHtml.replace(`PLACEHOLDER_${i}`, base64);
            }
            
            await pdfPage.setContent(finalHtml, { waitUntil: 'networkidle0' });
            
            await pdfPage.pdf({
              path: 'argocd-presentation.pdf',
              format: 'A4',
              landscape: true,
              printBackground: true,
              margin: {
                top: '0mm',
                right: '0mm',
                bottom: '0mm',
                left: '0mm'
              }
            });
            
            await pdfBrowser.close();
            console.log('PDF generated successfully with', images.length, 'slides');
          })();
          EOF

          node generate-pdf.js

      - name: Create workshop materials archive
        run: |
          # Create comprehensive release package
          mkdir -p argocd-workshop-${GITHUB_REF_NAME}

          # Copy all materials
          cp README.md argocd-workshop-${GITHUB_REF_NAME}/
          cp argocd-presentation.pdf argocd-workshop-${GITHUB_REF_NAME}/
          cp -r presentation argocd-workshop-${GITHUB_REF_NAME}/
          cp -r handson argocd-workshop-${GITHUB_REF_NAME}/

          # Create archives
          tar -czf argocd-workshop-${GITHUB_REF_NAME}.tar.gz argocd-workshop-${GITHUB_REF_NAME}/
          zip -r argocd-workshop-${GITHUB_REF_NAME}.zip argocd-workshop-${GITHUB_REF_NAME}/

      - name: Generate checksums
        run: |
          sha256sum argocd-workshop-${GITHUB_REF_NAME}.tar.gz > checksums.txt
          sha256sum argocd-workshop-${GITHUB_REF_NAME}.zip >> checksums.txt
          sha256sum argocd-presentation.pdf >> checksums.txt

      - name: Extract release notes
        id: extract_notes
        run: |
          # Try to extract release notes from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            # Extract notes for this version
            awk '/^## \['"${GITHUB_REF_NAME}"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release-notes.md
          fi

          # If no release notes found, create default ones
          if [ ! -s release-notes.md ]; then
            cat > release-notes.md << EOF
          ## Argo CD Workshop ${GITHUB_REF_NAME}

          ### 📦 Release Contents

          This release includes:
          - **Interactive Presentation** (HTML + PDF)
          - **5 Comprehensive Hands-On Labs**
          - **Example YAML Configurations**
          - **Quick Start Guide**
          - **Complete Workshop Materials**

          ### 🎯 Workshop Overview

          A complete 8-hour workshop on GitOps with Argo CD including:
          - GitOps principles and concepts
          - Argo CD installation and configuration
          - Application deployment and management
          - Drift detection and self-healing
          - Multi-tenancy with AppProjects
          - App of Apps pattern
          - Environment promotion strategies

          ### 📚 What's Included

          - **argocd-presentation.pdf** - Complete presentation in PDF format
          - **argocd-workshop-${GITHUB_REF_NAME}.tar.gz** - Full workshop package (Linux/Mac)
          - **argocd-workshop-${GITHUB_REF_NAME}.zip** - Full workshop package (Windows)
          - **checksums.txt** - SHA256 checksums for verification

          ### 🚀 Quick Start

          1. Download the archive for your platform
          2. Extract: \`tar -xzf argocd-workshop-${GITHUB_REF_NAME}.tar.gz\`
          3. Review the presentation: Open \`presentation/argocd/index.html\`
          4. Start labs: Follow \`handson/argocd/QUICK_START.md\`

          ### 📖 Documentation

          - Main README: Comprehensive workshop overview
          - Workshop Summary: Facilitator guide and tips
          - Lab READMEs: Step-by-step instructions for each lab

          ### 🔧 Prerequisites

          - Kubernetes cluster (local or cloud)
          - kubectl installed
          - helm v3+ installed
          - Basic Kubernetes knowledge

          ### 🙏 Acknowledgments

          Built with:
          - [Argo CD](https://argo-cd.readthedocs.io/)
          - [Impress.js](https://github.com/impress/impress.js)
          - [Argo CD Example Apps](https://github.com/argoproj/argocd-example-apps)
          EOF
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            argocd-presentation.pdf
            argocd-workshop-${{ github.ref_name }}.tar.gz
            argocd-workshop-${{ github.ref_name }}.zip
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
