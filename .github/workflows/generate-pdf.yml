name: Generate Presentation PDFs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF from Argo CD presentation
        run: |
          # Create a simple script to generate PDF
          cat > generate-pdf.js << 'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            const htmlPath = 'file://' + path.resolve('presentation/argocd/index.html');
            console.log('Loading presentation from:', htmlPath);
            
            await page.goto(htmlPath, { 
              waitUntil: 'networkidle0',
              timeout: 30000
            });
            
            // Wait for impress.js to initialize
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            // Get total number of slides
            const slideCount = await page.evaluate(() => {
              return document.querySelectorAll('.step').length;
            });
            
            console.log(`Found ${slideCount} slides. Capturing each slide...`);
            
            const images = [];
            
            // Navigate through each slide and capture
            for (let i = 0; i < slideCount; i++) {
              console.log(`Capturing slide ${i + 1}/${slideCount}`);
              
              // Navigate to next slide (except first)
              if (i > 0) {
                await page.keyboard.press('ArrowRight');
                await new Promise(resolve => setTimeout(resolve, 1500));
              } else {
                // Wait a bit for first slide
                await new Promise(resolve => setTimeout(resolve, 500));
              }
              
              // Take screenshot of the slide
              const screenshot = await page.screenshot({
                type: 'png',
                fullPage: false
              });
              
              images.push(screenshot);
            }
            
            await browser.close();
            
            console.log('Generating PDF from slides...');
            
            // Create a new browser instance to generate PDF from images
            const pdfBrowser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const pdfPage = await pdfBrowser.newPage();
            
            // Create HTML with all images
            const htmlContent = `
              <!DOCTYPE html>
              <html>
              <head>
                <style>
                  body { margin: 0; padding: 0; }
                  .slide { 
                    width: 100vw; 
                    height: 100vh; 
                    page-break-after: always;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    background: white;
                  }
                  .slide img {
                    max-width: 100%;
                    max-height: 100%;
                    object-fit: contain;
                  }
                  .slide:last-child { page-break-after: auto; }
                </style>
              </head>
              <body>
                ${images.map((_, idx) => `<div class="slide"><img src="data:image/png;base64,PLACEHOLDER_${idx}" /></div>`).join('')}
              </body>
              </html>
            `;
            
            // Replace placeholders with actual base64 images
            let finalHtml = htmlContent;
            for (let i = 0; i < images.length; i++) {
              const base64 = images[i].toString('base64');
              finalHtml = finalHtml.replace(`PLACEHOLDER_${i}`, base64);
            }
            
            await pdfPage.setContent(finalHtml, { waitUntil: 'networkidle0' });
            
            await pdfPage.pdf({
              path: 'argocd-presentation.pdf',
              format: 'A4',
              landscape: true,
              printBackground: true,
              margin: {
                top: '0mm',
                right: '0mm',
                bottom: '0mm',
                left: '0mm'
              }
            });
            
            await pdfBrowser.close();
            console.log('PDF generated successfully with', images.length, 'slides');
          })();
          EOF

          node generate-pdf.js

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: presentation-pdfs
          path: |
            argocd-presentation.pdf
          retention-days: 90

      - name: Create presentation archive
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          # Create a release-ready archive with all materials
          mkdir -p release-archive
          cp argocd-presentation.pdf release-archive/
          cp -r presentation release-archive/
          cp -r handson release-archive/
          cp README.md release-archive/

          # Create tar.gz archive
          tar -czf workshop-materials.tar.gz release-archive/

          # Create zip archive for Windows users
          zip -r workshop-materials.zip release-archive/

      - name: Upload workshop materials archive
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: workshop-materials
          path: |
            workshop-materials.tar.gz
            workshop-materials.zip
          retention-days: 90

      - name: Generate PDF summary
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "## 📊 PDF Generation Summary" > pdf-summary.md
          echo "" >> pdf-summary.md
          echo "✅ **Argo CD Presentation PDF**: Generated successfully" >> pdf-summary.md
          echo "" >> pdf-summary.md
          echo "### Files Generated:" >> pdf-summary.md
          echo "- \`argocd-presentation.pdf\` - $(du -h argocd-presentation.pdf | cut -f1)" >> pdf-summary.md
          echo "- \`workshop-materials.tar.gz\` - $(du -h workshop-materials.tar.gz | cut -f1)" >> pdf-summary.md
          echo "- \`workshop-materials.zip\` - $(du -h workshop-materials.zip | cut -f1)" >> pdf-summary.md
          echo "" >> pdf-summary.md
          echo "### Download Links:" >> pdf-summary.md
          echo "PDFs are available as workflow artifacts for 90 days." >> pdf-summary.md

      - name: Comment on PR with PDF info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('pdf-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
